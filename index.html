// ===== PRINT LOCK: prevents duplicate print dialogs =====
window._printLocked=false;
window._safePrint=function(){
  if(window._printLocked)return;
  window._printLocked=true;
  var _unlock=function(){window._printLocked=false;};
  function _fallback(){window.print();window.addEventListener("afterprint",_unlock,{once:true});setTimeout(_unlock,4000);}
  if(window._qzReady&&window.qz&&window.qz.websocket.isActive()){
    try{
      var isEfectivo=(window._cajeroPayment==="Efectivo");
      var printEl=document.querySelector(".print-only");
      if(!printEl){_fallback();return;}
      // Buscar el div de la boleta - el que tiene fontFamily monospace y width 80mm/58mm
      var boletaDiv=null;
      var allDivs=printEl.querySelectorAll("div");
      for(var d=0;d<allDivs.length;d++){
        var el=allDivs[d];
        var ff=el.style.fontFamily||"";
        var w=el.style.width||"";
        if(ff.indexOf("monospace")>-1&&(w.indexOf("mm")>-1||w.indexOf("80")>-1)){
          boletaDiv=el;break;
        }
      }
      if(!boletaDiv){
        for(var d=0;d<allDivs.length;d++){
          if((allDivs[d].style.fontFamily||"").indexOf("monospace")>-1){
            boletaDiv=allDivs[d];break;
          }
        }
      }
      if(!boletaDiv){boletaDiv=printEl;}
      // Usar html2canvas para capturar boleta como imagen PNG exacta
      if(typeof html2canvas==="undefined"){
        var s=document.createElement("script");
        s.src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js";
        s.onload=function(){doQZPrint();};
        document.head.appendChild(s);
      } else {
        doQZPrint();
      }
      function doQZPrint(){
        html2canvas(boletaDiv,{scale:2,useCORS:true,backgroundColor:"#ffffff"}).then(function(canvas){
          var imgData=canvas.toDataURL("image/png").split(",")[1];
          var w=canvas.width;
          var h=canvas.height;
          var devCopies=parseInt(localStorage.getItem("harmony_copies")||"1",10)||1;var cfg=window.qz.configs.create(window._qzPrinterName,{colorType:"blackWhite",margins:0,copies:devCopies});
          var cfgRaw=window.qz.configs.create(window._qzPrinterName,{});
          var printJob=window.qz.print(cfg,[{type:"pixel",format:"image",flavor:"base64",data:imgData,options:{pageWidth:80,pageHeight:Math.round(h*80/w),units:"mm"}}]);
          if(isEfectivo){
            printJob.then(function(){
              return window.qz.print(cfgRaw,[{type:"raw",format:"base64",data:"G3AAGfo="}]);
            }).then(function(){console.log("[HarmonyPOS] OK+gaveta");_unlock();}).catch(function(e){_fallback();});
          } else {
            printJob.then(function(){console.log("[HarmonyPOS] OK");_unlock();}).catch(function(e){_fallback();});
          }
        }).catch(function(e){console.warn("[HarmonyPOS] html2canvas error:",e);_fallback();});
      }
      return;
    }catch(e){console.warn("[HarmonyPOS] QZ exception:",e);}
  }
  _fallback();
};

// Lee datos desde Firebase (o localStorage como fallback)
async function Z1(){
  return new Promise(function(resolve){
    if(_fbReady && _fbRef){
      _fbRef.once('value').then(function(snap){
        var data=snap.val();
        if(data){resolve(data);}
        else{
          // Intentar localStorage como fallback
          try{var ls=localStorage.getItem(_o);resolve(ls?JSON.parse(ls):null);}
          catch{resolve(null);}
        }
      }).catch(function(){
        try{var ls=localStorage.getItem(_o);resolve(ls?JSON.parse(ls):null);}
        catch{resolve(null);}
      });
    } else {
      // Firebase aún no lista: esperar hasta 3 seg luego fallback
      var tries=0;
      var iv=setInterval(function(){
        tries++;
        if(_fbReady && _fbRef){
          clearInterval(iv);
          _fbRef.once('value').then(function(snap){
            var data=snap.val();
            resolve(data||null);
          }).catch(function(){resolve(null);});
        } else if(tries>60){
          clearInterval(iv);
          try{var ls=localStorage.getItem(_o);resolve(ls?JSON.parse(ls):null);}
          catch{resolve(null);}
        }
      },100);
    }
  });
}

// Escribe datos en Firebase + localStorage (fallback)
async function ko(e,_silent){
  try{
    var t={...e,_ts:Date.now()};
    // Siempre guardar en localStorage como backup
    try{localStorage.setItem(_o,JSON.stringify(t));}catch{}
    // Guardar en Firebase
    if(_fbReady && _fbRef){
      _fbRef.set(t).catch(function(err){
        // firebase write failed silently, queued
        _offlineQueue.push(t);
        _saveOfflineQueue();
      });
    } else {
      // Sin conexión o Firebase aún no listo: agregar a cola offline silenciosamente
      // offline - queued silently
      _offlineQueue.push(t);
      _saveOfflineQueue();
    }
  }catch(err){
    console.warn('[HarmonyPOS] ko error:',err);
  }
}

// === COLA OFFLINE ===
var _offlineQueue = [];
var _OFFLINE_KEY = 'harmony_offline_queue';

function _saveOfflineQueue(){
  try{localStorage.setItem(_OFFLINE_KEY, JSON.stringify(_offlineQueue));}catch{}
}

function _loadOfflineQueue(){
  try{
    var raw = localStorage.getItem(_OFFLINE_KEY);
    if(raw) _offlineQueue = JSON.parse(raw);
  }catch{}
}

function _flushOfflineQueue(){
  if(!_fbReady || !_fbRef || _offlineQueue.length === 0) return;
  console.log('[HarmonyPOS] WiFi reconectado. Subiendo', _offlineQueue.length, 'registros pendientes...');
  // Tomar el más reciente (el que tiene _ts más alto = estado más actualizado)
  var latest = _offlineQueue.reduce(function(a,b){ return (a._ts||0) > (b._ts||0) ? a : b; });
  _fbRef.set(latest).then(function(){
    console.log('[HarmonyPOS] Cola offline sincronizada correctamente');
    _offlineQueue = [];
    _saveOfflineQueue();
  }).catch(function(err){
    console.warn('[HarmonyPOS] Error al sincronizar cola offline:', err);
  });
}

// Cargar cola al iniciar
_loadOfflineQueue();

// Detectar reconexión de red y sincronizar automáticamente
window.addEventListener('online', function(){
  setTimeout(function(){
    if(_fbReady && _fbRef){
      _flushOfflineQueue();
    }
  }, 2000);
});


var Bs=null; // mantenemos null para compatibilidad, Firebase hace esto mejor

// La función que activa el listener se llama desde useEffect en la app
function _startFirebaseListener(onDataCb){
  if(!_fbListenerActive && _fbReady && _fbRef){
    _fbListenerActive=true;
    _fbRef.on('value',function(snap){
      var data=snap.val();
      if(data && data._ts && data._ts>_fbLastTs){
        _fbLastTs=data._ts;
        onDataCb(data);
      }
    });
    console.log('[HarmonyPOS] Listener Firebase activo - sincronización multi-PC ✓');
  } else if(!_fbReady){
    // Retry when ready
    var iv=setInterval(function(){
      if(_fbReady && _fbRef && !_fbListenerActive){
        clearInterval(iv);
        _startFirebaseListener(onDataCb);
      }
    },500);

      '<moneda_ingreso_codigo>PESO CL</moneda_ingreso_codigo>'+
      '<destino_codigo>ZFE</destino_codigo>'+
      '<usuario_rut_numero>77651870</usuario_rut_numero>'+
      '<usuario_rut_dv>0</usuario_rut_dv>'+
      '<comprador_rut_numero>'+rut+'</comprador_rut_numero>'+
      '<comprador_rut_dv>'+dv+'</comprador_rut_dv>'+
      '<comprador_nombre>'+nombre+'</comprador_nombre>'+
      '<comprador_direccion>'+dir+'</comprador_direccion>'+
      '</cabecera><detalle>'+items+'</detalle></documento>';
    var visarResp = await fetch('/.netlify/functions/zofri-proxy', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({action:'visar', token:token, documentoXML:xmlDoc})
    });
    var visarXml = await visarResp.text();
    if(visarXml.includes('NumeroProvisorio') || visarXml.includes('ACEPTADO') || visarXml.includes('OK')) {
      var numMatch = visarXml.match(/<NumeroProvisorio[^>]*>([^<]+)<\/NumeroProvisorio>/);
      var numProv = numMatch ? numMatch[1] : 'Ver ZOFRI';
      document.getElementById('zofri-form').innerHTML = 
        '<div style="text-align:center;padding:20px;">'+
        '<div style="font-size:48px;">✅</div>'+
        '<p style="font-size:16px;font-weight:900;color:#16a34a;">Declaración enviada a ZOFRI</p>'+
        '<p style="font-size:13px;color:#6b7280;">Carlos puede ir a ZOFRI Virtual > Pendientes de firma</p>'+
        '<p style="font-size:12px;color:#7c3aed;font-weight:700;">Nº Provisional: '+numProv+'</p>'+
        '<button onclick="document.getElementById('zofri-modal').style.display='none'" style="margin-top:16px;padding:12px 24px;background:#7c3aed;color:white;font-weight:700;border:none;border-radius:10px;cursor:pointer;">Cerrar</button>'+
        '</div>';
    } else {
      console.error('ZOFRI response:', visarXml);
      _zofrStatus('Respuesta inesperada de ZOFRI. Ver consola.', 'error');
    }
  } catch(e) { _zofrStatus('Error: ' + e.message, 'error'); }
};
function _zofrStatus(msg, type) {
  var el = document.getElementById('zofri-status');
  if(!el) return;
  el.style.display = 'block';
  el.style.background = type==='error'?'#fef2f2':type==='success'?'#f0fdf4':'#eff6ff';
  el.style.color = type==='error'?'#dc2626':type==='success'?'#16a34a':'#1d4ed8';
  el.textContent = msg;
}
</script>
